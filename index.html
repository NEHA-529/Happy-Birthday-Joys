<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Joys</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 35px;
            width: 85%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 1s;
        }

        button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #ff4d6d;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #e63946;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: scale(0.8);}
            to {opacity:1; transform: scale(1);}
        }

        /* Stylish Letter */
        .letter {
            font-size: 60px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            text-shadow: 0 0 10px #fff,
                         0 0 20px #ff4d6d,
                         0 0 30px #ff4d6d;
            animation: zoom 1.5s infinite alternate;
        }

        @keyframes zoom {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Final Message */
        .finalText {
            font-size: 45px;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 10px #fff,
                         0 0 20px #ff4d6d,
                         0 0 30px #ff4d6d;
            animation: fadeIn 2s;
            padding: 20px;
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            animation: floatUp 8s infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120vh); }
        }
    </style>
</head>

<body>

<!-- Balloons -->
<div class="balloon" style="left:10%; background:#ff4d6d;"></div>
<div class="balloon" style="left:30%; background:#6a4c93;"></div>
<div class="balloon" style="left:50%; background:#1982c4;"></div>
<div class="balloon" style="left:70%; background:#8ac926;"></div>
<div class="balloon" style="left:90%; background:#ffca3a;"></div>

<div class="card" id="card">
    <h2>Hey Joys 😜</h2>
    <p>I have a small surprise for you 🎁</p>
    <button onclick="startQuestions()">Click Me</button>
</div>

<script>

function startQuestions(){
    document.getElementById("card").innerHTML = `
        <h2>Question 1</h2>
        <p>What is the most special thing in our friendship?</p>
        <button onclick="showHappy()">Our Memories 😊</button>
        <button onclick="showHappy()">Our Caring ❤️</button>
        <button onclick="showHappy()">Everything 😍</button>
    `;
}

function showHappy(){
    document.getElementById("card").innerHTML = `
        <div class="letter">HAPPY</div>
        <br>
        <button onclick="question2()">Next ➜</button>
    `;
}

function question2(){
    document.getElementById("card").innerHTML = `
        <h2>Question 2</h2>
        <p>How many years of our friendship?</p>
        <button onclick="showBday()">10 Years</button>
        <button onclick="showBday()">15 Years</button>
        <button onclick="showBday()">20 Years ❤️</button>
    `;
}

function showBday(){
    document.getElementById("card").innerHTML = `
        <div class="letter">B'DAY</div>
        <br>
        <button onclick="question3()">Next ➜</button>
    `;
}

function question3(){
    document.getElementById("card").innerHTML = `
        <h2>Question 3</h2>
        <p>Will you stay with me forever and never leave me?</p>
        <button onclick="showJoys()">Yes ❤️</button>
        <button onclick="showJoys()">Yes Forever 😍</button>
    `;
}

function showJoys(){
    document.getElementById("card").innerHTML = `
        <div class="letter">JOYS</div>
        <br>
        <button onclick="finalPage()">Final Surprise 🎁</button>
    `;
}

function finalPage(){
    document.body.innerHTML = `
        <div class="finalText">
            HAPPY BIRTHDAY JOYS 🎉<br><br>
            Thank you for 20 years of friendship ❤️<br>
            You are my best friend forever 💖<br>
            I will never leave you 💫
        </div>

        <div class="balloon" style="left:10%; background:#ff4d6d;"></div>
        <div class="balloon" style="left:30%; background:#6a4c93;"></div>
        <div class="balloon" style="left:50%; background:#1982c4;"></div>
        <div class="balloon" style="left:70%; background:#8ac926;"></div>
        <div class="balloon" style="left:90%; background:#ffca3a;"></div>
    `;
}

</script>

</body>
</html>
